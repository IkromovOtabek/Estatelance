# ================================================================
# Nginx config — EstateLance
# 1. Copy to: /etc/nginx/sites-available/estatelance
# 2. ln -s /etc/nginx/sites-available/estatelance /etc/nginx/sites-enabled/
# 3. certbot --nginx -d yourdomain.com -d www.yourdomain.com
# 4. nginx -t && systemctl reload nginx
# ================================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name bufu.uz www.bufu.uz;
    return 301 https://$host$request_uri;
}

# Frontend (Next.js — port 3000)
server {
    listen 443 ssl http2;
    server_name bufu.uz www.bufu.uz;

    # SSL — certbot fills these automatically
    ssl_certificate     /etc/letsencrypt/live/bufu.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bufu.uz/privkey.pem;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Static files cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Android APK (Telegram bot shu yerdan yuklab beradi) ──
    # APK faylni shu papkaga qo'ying: /var/www/estatelance/downloads/bufu.apk
    location /downloads/ {
        alias /var/www/estatelance/downloads/;
        # APK to'g'ri yuklab olinishi uchun MIME turi
        types { application/vnd.android.package-archive apk; }
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="bufu.apk"';
        expires 1h;
    }

    # Main app
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# Backend API (NestJS — port 3007)
server {
    # ⚠️ http2 OLIB TASHLANDI: React Native networking http2 ulanishni noto'g'ri
    # qayta ishlatib, HTTPS portga plaintext yuboradi → nginx 400 "plain HTTP
    # request was sent to HTTPS port". HTTP/1.1 da mobil ilova ishonchli ishlaydi.
    # (GraphQL kichik so'rovlar uchun http2 multiplexing foydasi ahamiyatsiz.)
    listen 443 ssl;
    server_name api.bufu.uz;

    ssl_certificate     /etc/letsencrypt/live/api.bufu.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bufu.uz/privkey.pem;

    add_header X-Frame-Options        "DENY"   always;
    add_header X-Content-Type-Options "nosniff" always;

    # Upload files (serve directly)
    location /uploads/ {
        alias /var/www/estatelance/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # WebSocket — socket.io /chat namespace
    location /chat/ {
        proxy_pass         http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # GraphQL API
    location / {
        proxy_pass         http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Block body > 10mb
        client_max_body_size 10m;
    }
}
